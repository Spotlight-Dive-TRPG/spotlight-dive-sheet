<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>スポットライト・ダイブ キャラクターシート</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 前回と同じスタイル（省略） */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', 'Comic Neue', 'メイリオ', sans-serif;
            background: linear-gradient(135deg, #fff9e6 0%, #fff0e0 100%);
            padding: 12px;
            color: #333;
            min-height: 100vh;
        }
        .toolbar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .btn { background: #ffaa00; border: none; border-radius: 30px; padding: 8px 16px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 0.9rem; }
        .btn:hover { background: #ff8800; transform: translateY(-1px); }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .sheet-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            padding: 30px;
            transition: max-width 0.3s ease;
        }
        .sheet-container.smartphone-mode { max-width: 480px; }
        h1 { text-align: center; font-size: 2.2rem; margin-bottom: 20px; border-bottom: 4px solid #ffaa00; padding-bottom: 10px; color: #222; }
        .section { margin-bottom: 25px; background: #fefefe; border-radius: 20px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .section-title { font-size: 1.4rem; font-weight: bold; color: #444; border-left: 8px solid #ffaa00; padding-left: 15px; margin-bottom: 20px; background: #f9f9f9; }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 6px; color: #555; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 0.95rem; transition: 0.2s; background: white; }
        input:focus, select:focus, textarea:focus { border-color: #ffaa00; box-shadow: 0 0 0 3px rgba(255,170,0,0.1); outline: none; }
        .image-area { background: #faf7f0; border: 2px dashed #ffaa00; border-radius: 16px; padding: 16px; text-align: center; margin-bottom: 20px; }
        .image-preview { max-width: 200px; max-height: 200px; margin: 10px auto; border-radius: 12px; display: none; }
        .image-preview.show { display: block; }
        .chart-container { text-align: center; margin: 20px 0; }
        canvas { max-width: 100%; height: auto; background: white; border-radius: 12px; }
        .stat-inputs { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-top: 15px; }
        .skills-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .skill-category { background: #faf7f0; border-radius: 14px; padding: 14px; }
        .skill-category h4 { margin-bottom: 12px; color: #ffaa00; font-size: 1.1rem; border-bottom: 2px solid #ffaa00; padding-bottom: 4px; }
        .skill-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.85rem; }
        .skill-row label { font-weight: normal; width: 65px; }
        .skill-row input { width: 70px; text-align: center; padding: 6px; }
        .relationship-item { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; flex-wrap: wrap; }
        .relationship-item input { flex: 1; min-width: 120px; }
        .relationship-item button { background: #ffaa00; border: none; border-radius: 20px; padding: 6px 12px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .record-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 15px; }
        .status-badges { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .status-badge { background: #f0f0f0; padding: 6px 14px; border-radius: 30px; font-size: 0.85rem; cursor: pointer; user-select: none; transition: 0.2s; }
        .status-badge.active { background: #ffaa00; color: white; font-weight: bold; }
        .copyright { text-align: center; margin-top: 30px; padding-top: 15px; border-top: 1px solid #ddd; color: #888; font-size: 0.75rem; }
        .token-area { display: none; background: #fff8e8; border: 2px solid #ffaa00; border-radius: 16px; padding: 16px; margin-top: 15px; }
        .token-area.show { display: block; }
        @media (max-width: 768px) {
            .two-columns, .skills-grid, .record-row { grid-template-columns: 1fr; }
            .stat-inputs { grid-template-columns: repeat(2, 1fr); }
            .sheet-container { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <button class="btn" id="screenshot-btn">📸 スクリーンショット</button>
    <button class="btn btn-secondary" id="smartphone-mode-btn">📱 スマホ表示</button>
    <button class="btn btn-secondary" id="pc-mode-btn" style="display:none;">💻 PC表示に戻す</button>
</div>

<div class="sheet-container" id="sheet-container">
    <h1>⚡ スポットライト・ダイブ ⚡<br><span style="font-size:0.7rem;">キャラクターシート</span></h1>

    <div class="two-columns">
        <!-- 左カラム -->
        <div class="section">
            <div class="section-title">📋 基本情報</div>
            <div class="input-group">
                <label>キャラクター名</label>
　　　　　　　　　 <input type="text" id="char-name" 
            </div>
            <div class="input-group">
                <label>キャッチフレーズ</label>
                <input type="text" id="catchphrase" placeholder="例：正義の味方、参上！">
            </div>
            <div class="input-group">
                <label>ジョブ</label>
                <select id="job">
                    <option value="">選択してください</option>
                    <option value="ヒーロー">ヒーロー</option>
                    <option value="忍者">忍者</option>
                    <option value="アイドル">アイドル</option>
                    <option value="剣士">剣士</option>
                    <option value="発明家">発明家</option>
                    <option value="アスリート">アスリート</option>
                    <option value="怪盗">怪盗</option>
                    <option value="スパイ">スパイ</option>
                    <option value="料理人">料理人</option>
                    <option value="カードバトラー">カードバトラー</option>
                    <option value="警察官">警察官</option>
                    <option value="ロボマイスター">ロボマイスター</option>
                    <option value="学生">学生</option>
                    <option value="探偵">探偵</option>
                    <option value="アヤカシ使い">アヤカシ使い</option>
                    <option value="ゴリラマスター">ゴリラマスター</option>
                </select>
            </div>
            <div class="input-group">
                <label>固有スキル</label>
                <input type="text" id="skill-name" readonly placeholder="ジョブを選択すると表示されます">
            </div>
            <div class="input-group">
                <label>スキル効果</label>
                <textarea id="skill-effect" rows="2" readonly placeholder="ジョブを選択すると効果が表示されます"></textarea>
            </div>
            <div id="token-area" class="token-area">
                <div class="section-title" style="font-size:1rem;">🤖 トークン情報</div>
                <div class="input-group"><label>トークン名</label><input type="text" id="token-name" placeholder="例：ネオ・アルティメット・ドラゴン"></div>
                <div class="input-group"><label>トークン必殺技名</label><input type="text" id="token-special" placeholder="例：インフェルノ・シュート"></div>
                <div class="input-group"><label>トークン必殺技効果</label><textarea id="token-effect" rows="2"></textarea></div>
                <div class="input-group"><label>📌 メモ</label><textarea id="token-memo" rows="2"></textarea></div>
            </div>
            <div class="input-group">
                <label>📝 キャラクター概要・プロフィール</label>
                <textarea id="profile" rows="4"></textarea>
            </div>
        </div>
        <!-- 右カラム -->
        <div class="section">
            <div class="section-title">🖼️ キャラクター画像</div>
            <div class="image-area">
                <input type="file" id="image-upload" accept="image/*">
                <img id="character-image" class="image-preview" alt="キャラクター画像">
            </div>
            <div class="section-title" style="margin-top:15px;">📊 戦闘記録</div>
            <div class="record-row">
                <div class="input-group"><label>✨ スポットライト獲得数</label><input type="number" id="spotlight" min="0" value="0"></div>
                <div class="input-group"><label>💬 残りナイス！回数</label><select id="nice-left"><option value="3">3回</option><option value="2">2回</option><option value="1">1回</option><option value="0">0回</option></select></div>
                <div class="input-group"><label>🔥 必殺技名</label><input type="text" id="special-name" placeholder="例：ジャスティスクラッシュ"></div>
            </div>
            <div class="input-group"><label>🎲 ドラマチックポイント (DP) 上限5</label><input type="number" id="dp" min="0" max="5" value="0"></div>
        </div>
    </div>

    <!-- ステータス＋五角形チャート -->
    <div class="section">
        <div class="section-title">💪 ステータス</div>
        <div class="stat-inputs">
            <div class="input-group"><label>運 (1-6)</label><input type="number" id="luck" min="1" max="6" value="3"></div>
            <div class="input-group"><label>人間性 (1-6)</label><input type="number" id="humanity" min="1" max="6" value="3"></div>
            <div class="input-group"><label>体力 (1-6)</label><input type="number" id="stamina" min="1" max="6" value="3"></div>
            <div class="input-group"><label>力 (1-6)</label><input type="number" id="strength" min="1" max="6" value="3"></div>
            <div class="input-group"><label>頭脳 (1-6)</label><input type="number" id="intelligence" min="1" max="6" value="3"></div>
        </div>
        <div class="chart-container"><canvas id="radarChart" width="400" height="400"></canvas></div>
        <div class="input-group"><label>💖 HP（自動計算）: <strong id="hpDisplay">?</strong></label></div>
        <div class="input-group"><label>⭐ 技能強化ポイント: <strong id="totalStatus">0</strong></label></div>
    </div>

    <!-- 技能値一覧 -->
    <div class="section">
        <div class="section-title">📚 技能値</div>
        <p><strong>残り技能ポイント: <span id="remainingPoints">0</span></strong></p>
        <div id="skills-grid" class="skills-grid"></div>
    </div>

    <!-- 関係性＋状態異常 -->
    <div class="two-columns">
        <div class="section">
            <div class="section-title">🤝 関係性（任意）</div>
            <div id="relationship-container"></div>
            <button type="button" class="btn" id="add-relationship" style="margin-top:10px; width:100%;">＋ 関係性を追加</button>
        </div>
        <div class="section">
            <div class="section-title">⚠️ 状態異常</div>
            <div class="status-badges" id="status-badges"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">📝 メモ・特記事項</div>
        <textarea id="memo" rows="3"></textarea>
    </div>

    <div class="copyright">© 2026 スポットライト・ダイブ製作委員会</div>
</div>

<script>
    // ========== データ定義 ==========
    const skillCategories = {
        "⚔️ 戦闘系": ["sword","shoot","martial","throw","evade","defense","restrain"],
        "🔍 探索系": ["observe","search","stealth","survival","track","escape"],
        "⚙️ 技術系": ["repair","operate","drive","medical","steal","craft"],
        "📖 知識系": ["academics","mind","luckSkill","intuition","history","investigate"],
        "🗣️ 社交系": ["negotiate","trust","lie","intimidate","disguise","perform"],
        "🏃 アクション系": ["acrobatics","run","provoke","jump","protect","climb"]
    };
    const skillNames = {
        sword:"剣術", shoot:"射撃", martial:"格闘", throw:"投擲", evade:"回避", defense:"防御", restrain:"拘束",
        observe:"観察", search:"捜索", stealth:"隠密", survival:"生存", track:"追跡", escape:"逃避",
        repair:"修理", operate:"操作", drive:"運転", medical:"医療", steal:"奪取", craft:"制作",
        academics:"学問", mind:"読心", luckSkill:"幸運", intuition:"直感", history:"歴史", investigate:"調査",
        negotiate:"交渉", trust:"信用", lie:"嘘", intimidate:"威圧", disguise:"変装", perform:"パフォーマンス",
        acrobatics:"体術", run:"走破", provoke:"挑発", jump:"ジャンプ", protect:"かばう", climb:"クライミング"
    };
    const allSkillIds = Object.values(skillCategories).flat();

    const jobSkillMap = {
        "ヒーロー": ["martial","evade","protect"], "忍者":["stealth","throw","observe"],
        "アイドル":["perform","negotiate","luckSkill"], "剣士":["sword","acrobatics","run"],
        "発明家":["repair","operate","craft"], "アスリート":["run","jump","acrobatics"],
        "怪盗":["steal","escape","stealth"], "スパイ":["disguise","lie","investigate"],
        "料理人":["craft","martial","luckSkill"], "カードバトラー":["luckSkill","lie","intuition"],
        "警察官":["intimidate","track","martial"], "ロボマイスター":["repair","operate","craft"],
        "学生":["run","academics","luckSkill"], "探偵":["observe","investigate","intuition"],
        "アヤカシ使い":["luckSkill","intuition","stealth"], "ゴリラマスター":["martial","throw","intimidate"]
    };
    const jobWeakSkillMap = {
        "ヒーロー":["steal","lie"], "忍者":["intimidate","negotiate"], "アイドル":["martial","repair"],
        "剣士":["operate","disguise"], "発明家":["martial","intuition"], "アスリート":["mind","academics"],
        "怪盗":["martial","intimidate"], "スパイ":["martial","craft"], "料理人":["history","academics"],
        "カードバトラー":["martial","run"], "警察官":["lie","stealth"], "ロボマイスター":["perform","mind"],
        "学生":["intimidate","lie"], "探偵":["martial","disguise"], "アヤカシ使い":["craft","intimidate"],
        "ゴリラマスター":["operate","academics"]
    };
    const jobSkillInfoMap = {
        "ヒーロー": { name: "ジャスティスハート（常時）", effect: "HP半分以下で全判定+1、与ダメージ+1" },
        "忍者": { name: "刃の心（DP2）", effect: "次の判定自動成功、被ダメージ-2(1T)" },
        "アイドル": { name: "あなたのハートをロックオン！（常時）", effect: "交渉・パフォーマンス・信用+1。パフォーマンス好評でスポットライト+1" },
        "剣士": { name: "二刀流（DP2）", effect: "攻撃2回、両方成功で獲得数+1" },
        "発明家": { name: "実験を始めようか！（DP2）", effect: "制作・修理+2、失敗で自傷1(1セッション2回)" },
        "アスリート": { name: "ド根性ッ！（常時）", effect: "HP0を1度HP1で耐える＋即時自分のターン(1回/セッション)" },
        "怪盗": { name: "予告する（DP1）", effect: "奪取自動成功＋離脱" },
        "スパイ": { name: "FAKE（DP2）", effect: "このターン単体攻撃を受けない" },
        "料理人": { name: "Bon appétit（DP2）", effect: "全員HP1d6回復＋料理説明で美味しそうならスポットライト+1" },
        "カードバトラー": { name: "俺のターン！（DP3）", effect: "1d6→1-2：次攻撃自動成功＆ダメ2倍／3-4：判定やり直し+技能値+2／5-6：他者にスポットライト+2,DP+2,次判定+1" },
        "警察官": { name: "実力を行使（常時）", effect: "威圧・追跡+1、善行語りでスポットライト+1" },
        "ロボマイスター": { name: "バトル・スタート！（DP2）", effect: "ロボトークンHP全回復(1回/セッション)" },
        "学生": { name: "青い春（常時）", effect: "走破・学問+1、青春語りでスポットライト+1" },
        "探偵": { name: "『名探偵』の名にかけて（DP2）", effect: "味方判定+2、自分【動揺】" },
        "アヤカシ使い": { name: "ウォッチ！（DP2）", effect: "HP半分以下で次攻撃+2、出目6以上で次ラウンド終了まで【動揺】(1回/セッション)" },
        "ゴリラマスター": { name: "ゴリラゴリラゴリラ（常時）", effect: "ゴリラトークン攻撃+2、状態異常適用、語尾「ウホッ！」" }
    };
    const tokenJobs = ["カードバトラー", "ロボマイスター", "アヤカシ使い", "ゴリラマスター"];

    let skillBaseValues = {};
    allSkillIds.forEach(id => { skillBaseValues[id] = 4; });

    function getVal(id) { return Number(document.getElementById(id)?.value) || 0; }
    function updateHP() {
        let hp = getVal('stamina') + getVal('strength') + 5;
        let el = document.getElementById('hpDisplay');
        if (el) el.innerText = hp;
    }
    function updateTotalStatus() {
        let total = getVal('luck')+getVal('humanity')+getVal('stamina')+getVal('strength')+getVal('intelligence');
        let el = document.getElementById('totalStatus');
        if (el) el.innerText = total;
        return total;
    }
    function updateRemainingPoints() {
        let total = updateTotalStatus();
        let used = 0;
        allSkillIds.forEach(id => {
            let val = getVal(id);
            if (val) used += (val - skillBaseValues[id]);
        });
        let el = document.getElementById('remainingPoints');
        if (el) el.innerText = total - used;
    }

    function setJobSkills() {
        let job = document.getElementById('job')?.value;
        let info = jobSkillInfoMap[job];
        let nameInput = document.getElementById('skill-name');
        let effectText = document.getElementById('skill-effect');
        if (nameInput) nameInput.value = info ? info.name : "";
        if (effectText) effectText.value = info ? info.effect : "";

        let tokenArea = document.getElementById('token-area');
        if (tokenArea) {
            if (tokenJobs.includes(job)) tokenArea.classList.add('show');
            else tokenArea.classList.remove('show');
        }
        if (!job) return;
        // 基本値リセット
        allSkillIds.forEach(id => skillBaseValues[id] = 4);
        // 不得意
        (jobWeakSkillMap[job] || []).forEach(id => { if(skillBaseValues.hasOwnProperty(id)) skillBaseValues[id] = 3; });
        // 得意
        (jobSkillMap[job] || []).forEach(id => { if(skillBaseValues.hasOwnProperty(id)) skillBaseValues[id] = 6; });
        // UI反映
        allSkillIds.forEach(id => {
            let input = document.getElementById(id);
            if (input) input.value = skillBaseValues[id];
        });
        updateRemainingPoints();
    }

    // 技能UI生成
    function buildSkillsUI() {
        let container = document.getElementById('skills-grid');
        if (!container) return;
        container.innerHTML = '';
        for (let [cat, ids] of Object.entries(skillCategories)) {
            let div = document.createElement('div');
            div.className = 'skill-category';
            div.innerHTML = `<h4>${cat}</h4>`;
            ids.forEach(id => {
                let row = document.createElement('div');
                row.className = 'skill-row';
                row.innerHTML = `<label>${skillNames[id]}</label><input type="number" id="${id}" min="3" max="10" value="4">`;
                div.appendChild(row);
            });
            container.appendChild(div);
        }
        allSkillIds.forEach(id => {
            let el = document.getElementById(id);
            if (el) el.addEventListener('input', updateRemainingPoints);
        });
        updateRemainingPoints();
    }

    // 関係性
    function addRelationshipField(name="", desc="") {
        let container = document.getElementById('relationship-container');
        if (!container) return;
        let div = document.createElement('div');
        div.className = 'relationship-item';
        div.innerHTML = `
            <input type="text" placeholder="相手の名前" value="${name.replace(/"/g, '&quot;')}">
            <input type="text" placeholder="関係性" value="${desc.replace(/"/g, '&quot;')}">
            <button onclick="this.parentElement.remove()">削除</button>
        `;
        container.appendChild(div);
    }

    // 状態異常
    const statusList = ["毒","睡魔","動揺","麻痺","魅了","空腹"];
    let activeStatus = new Set();
    function renderStatusBadges() {
        let container = document.getElementById('status-badges');
        if (!container) return;
        container.innerHTML = '';
        statusList.forEach(s => {
            let badge = document.createElement('div');
            badge.className = 'status-badge' + (activeStatus.has(s) ? ' active' : '');
            badge.innerText = `【${s}】`;
            badge.onclick = () => {
                if (activeStatus.has(s)) activeStatus.delete(s);
                else activeStatus.add(s);
                renderStatusBadges();
            };
            container.appendChild(badge);
        });
    }

    // 五角形チャート
    function drawRadar() {
        let canvas = document.getElementById('radarChart');
        if (!canvas) return;
        let ctx = canvas.getContext('2d');
        let w = canvas.width, h = canvas.height;
        ctx.clearRect(0,0,w,h);
        let cx = w/2, cy = h/2;
        let radius = Math.min(w,h)*0.35;
        let angles = [-Math.PI/2, -Math.PI/2+2*Math.PI/5, -Math.PI/2+4*Math.PI/5, -Math.PI/2+6*Math.PI/5, -Math.PI/2+8*Math.PI/5];
        let labels = ["運","人間性","体力","力","頭脳"];
        let vals = [getVal('luck'), getVal('humanity'), getVal('stamina'), getVal('strength'), getVal('intelligence')];
        for (let lvl=1; lvl<=6; lvl++) {
            ctx.beginPath();
            let r = radius * lvl / 6;
            for (let i=0;i<5;i++) {
                let x = cx + r * Math.cos(angles[i]);
                let y = cy + r * Math.sin(angles[i]);
                if (i===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.closePath();
            ctx.strokeStyle="#ddd";
            ctx.stroke();
        }
        for (let i=0;i<5;i++) {
            let x = cx + radius * Math.cos(angles[i]);
            let y = cy + radius * Math.sin(angles[i]);
            ctx.beginPath();
            ctx.moveTo(cx,cy);
            ctx.lineTo(x,y);
            ctx.stroke();
            ctx.fillStyle="#333";
            ctx.font="bold 12px sans-serif";
            let lx = cx + (radius+15)*Math.cos(angles[i]);
            let ly = cy + (radius+15)*Math.sin(angles[i]);
            ctx.fillText(labels[i], lx-10, ly-5);
        }
        ctx.beginPath();
        for (let i=0;i<5;i++) {
            let r = radius * Math.min(6, Math.max(0, vals[i])) / 6;
            let x = cx + r * Math.cos(angles[i]);
            let y = cy + r * Math.sin(angles[i]);
            if (i===0) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);
        }
        ctx.closePath();
        ctx.fillStyle = "rgba(255,170,0,0.3)";
        ctx.fill();
        ctx.strokeStyle = "#ffaa00";
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    // 画像アップロード
    document.getElementById('image-upload')?.addEventListener('change', function(e) {
        let file = e.target.files[0];
        if (file) {
            let reader = new FileReader();
            reader.onload = ev => {
                let img = document.getElementById('character-image');
                if (img) {
                    img.src = ev.target.result;
                    img.classList.add('show');
                }
            };
            reader.readAsDataURL(file);
        }
    });

    // スクリーンショット
    document.getElementById('screenshot-btn')?.addEventListener('click', function() {
        let el = document.getElementById('sheet-container');
        if (!el) return;
        html2canvas(el, { scale: 2, backgroundColor: '#ffffff', useCORS: true })
            .then(canvas => {
                let link = document.createElement('a');
                link.download = 'spotlight-dive-character.png';
                link.href = canvas.toDataURL();
                link.click();
            })
            .catch(() => alert('スクリーンショットに失敗しました'));
    });

    // スマホ表示切替
    let container = document.getElementById('sheet-container');
    let smartBtn = document.getElementById('smartphone-mode-btn');
    let pcBtn = document.getElementById('pc-mode-btn');
    if (smartBtn && pcBtn && container) {
        smartBtn.onclick = () => {
            container.classList.add('smartphone-mode');
            smartBtn.style.display = 'none';
            pcBtn.style.display = 'inline-block';
        };
        pcBtn.onclick = () => {
            container.classList.remove('smartphone-mode');
            pcBtn.style.display = 'none';
            smartBtn.style.display = 'inline-block';
        };
    }

    // 初期化（DOMContentLoaded で確実に）
    document.addEventListener('DOMContentLoaded', function() {
        buildSkillsUI();
        renderStatusBadges();
        addRelationshipField("PL2","幼なじみ");
        addRelationshipField("PL3","ライバル");
        addRelationshipField("PL4","師弟関係");
        let addBtn = document.getElementById('add-relationship');
        if (addBtn) addBtn.onclick = () => addRelationshipField();

        // ステータス変更
        ['luck','humanity','stamina','strength','intelligence'].forEach(id => {
            let el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', () => {
                    updateHP();
                    updateTotalStatus();
                    updateRemainingPoints();
                    drawRadar();
                });
            }
        });
        // ジョブ変更
        let jobSelect = document.getElementById('job');
        if (jobSelect) jobSelect.addEventListener('change', () => {
            setJobSkills();
            drawRadar();
        });
        updateHP();
        updateTotalStatus();
        drawRadar();
        setJobSkills(); // 初期表示（未選択の場合は空）
    });
</script>
</body>
</html>
