<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>スポットライト・ダイブ オンラインキャラクターシート</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'Comic Neue', 'メイリオ', sans-serif;
            margin: 0;
            padding: 12px;
            background: linear-gradient(135deg, #fff9e6 0%, #fff0e0 100%);
            color: #333;
            min-height: 100vh;
        }
        .toolbar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .btn {
            background: #ffaa00;
            border: none;
            border-radius: 30px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            font-size: 0.9rem;
        }
        .btn:hover { background: #ff8800; transform: translateY(-1px); }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .sheet-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            padding: 20px;
            transition: max-width 0.3s ease;
        }
        .sheet-container.smartphone-mode { max-width: 480px; }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin: 0 0 15px;
            padding-bottom: 10px;
            border-bottom: 3px solid #ffaa00;
            color: #222;
            word-break: keep-all;
        }
        .section {
            margin-bottom: 20px;
            background: #fefefe;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.05);
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #444;
            border-left: 6px solid #ffaa00;
            padding-left: 12px;
            margin-bottom: 16px;
            background: #f9f9f9;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .input-group { margin-bottom: 16px; }
        .input-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
            color: #555;
            font-size: 0.9rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.2s;
            background: white;
        }
        textarea {
            resize: vertical;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #ffaa00;
            box-shadow: 0 0 0 3px rgba(255,170,0,0.1);
        }
        .image-area {
            background: #faf7f0;
            border: 2px dashed #ffaa00;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            margin-bottom: 16px;
        }
        .image-preview { max-width: 100%; max-height: 200px; margin: 10px auto; border-radius: 12px; display: none; object-fit: contain; }
        .image-preview.show { display: block; }
        .chart-container { text-align: center; margin: 15px 0; }
        canvas { max-width: 100%; height: auto; background: white; border-radius: 12px; }
        .stat-inputs {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 15px;
        }
        .stat-inputs .input-group { margin-bottom: 0; }
        .stat-inputs input { text-align: center; padding: 8px; }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .skill-category {
            background: #faf7f0;
            border-radius: 12px;
            padding: 12px;
        }
        .skill-category h4 {
            margin: 0 0 10px;
            color: #ffaa00;
            font-size: 1rem;
            border-bottom: 2px solid #ffaa00;
            padding-bottom: 4px;
        }
        .skill-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .skill-row label { font-weight: normal; margin: 0; width: 65px; }
        .skill-row input { width: 70px; text-align: center; padding: 6px; font-size: 0.85rem; }
        .relationship-item {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .relationship-item input { flex: 1; min-width: 120px; }
        .relationship-item button {
            background: #ffaa00;
            border: none;
            border-radius: 20px;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .record-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        .status-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }
        .status-badge {
            background: #f0f0f0;
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }
        .status-badge.active { background: #ffaa00; color: white; font-weight: bold; }
        .copyright {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #ddd;
            color: #888;
            font-size: 0.75rem;
        }

        /* ========== スマホ表示最適化 ========== */
        @media (max-width: 768px) {
            body { padding: 8px; }
            .sheet-container { padding: 15px; }
            .sheet-container.smartphone-mode { max-width: 100%; margin: 0; }
            h1 { font-size: 1.5rem; }
            .section { padding: 14px; margin-bottom: 15px; }
            .section-title { font-size: 1.2rem; margin-bottom: 12px; }
            .two-columns { grid-template-columns: 1fr; gap: 15px; }
            input, select, textarea { font-size: 1rem; padding: 12px 12px; }
            .skills-grid { grid-template-columns: 1fr; gap: 12px; }
            .skill-category { padding: 14px; }
            .skill-row {
                font-size: 0.95rem;
                margin-bottom: 12px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .skill-row label { width: auto; flex: 1; }
            .skill-row input {
                width: auto;
                min-width: 70px;
                flex-shrink: 0;
                margin-left: 8px;
                font-size: 0.95rem;
                padding: 8px;
            }
            .image-area { padding: 12px; }
            .image-preview { max-height: 220px; }
            .stat-inputs { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-inputs input { font-size: 1rem; padding: 10px; }
            .record-row { grid-template-columns: 1fr; gap: 12px; }
            .toolbar { justify-content: center; }
            .btn { padding: 8px 16px; font-size: 0.9rem; }
            .relationship-item input { min-width: 140px; }
            .relationship-item button { padding: 8px 14px; }
        }
    </style>
</head>
<body>
<div class="toolbar">
    <button class="btn" id="screenshot-btn">📸 スクリーンショット</button>
    <button class="btn btn-secondary" id="smartphone-mode-btn">📱 スマホ表示</button>
    <button class="btn btn-secondary" id="pc-mode-btn" style="display:none;">💻 PC表示に戻す</button>
</div>

<div class="sheet-container" id="sheet-container">
    <h1>⚡ スポットライト・ダイブ ⚡<br><span style="font-size:0.7rem;">キャラクターシート</span></h1>

    <!-- 基本情報と画像エリア -->
    <div class="two-columns">
        <div class="section">
            <div class="section-title">📋 基本情報</div>
            <div class="input-group">
                <label>キャラクター名</label>
                <input type="text" id="char-name" placeholder="例：アリス・ブレイブ">
            </div>
            <div class="input-group">
                <label>キャッチフレーズ</label>
                <input type="text" id="catchphrase" placeholder="例：正義の味方、参上！">
            </div>
            <div class="input-group">
                <label>ジョブ</label>
                <select id="job">
                    <option value="">選択してください</option>
                    <option value="ヒーロー">ヒーロー</option>
                    <option value="忍者">忍者</option>
                    <option value="アイドル">アイドル</option>
                    <option value="剣士">剣士</option>
                    <option value="発明家">発明家</option>
                    <option value="アスリート">アスリート</option>
                    <option value="怪盗">怪盗</option>
                    <option value="スパイ">スパイ</option>
                    <option value="料理人">料理人</option>
                    <option value="カードマスター">カードマスター</option>
                    <option value="警察官">警察官</option>
                    <option value="ロボマイスター">ロボマイスター</option>
                    <option value="学生">学生</option>
                    <option value="無職（フリーダム）">無職（フリーダム）</option>
                    <option value="元主人公">元主人公</option>
                </select>
            </div>
            <div class="input-group">
                <label>固有スキル</label>
                <input type="text" id="skill-name" readonly placeholder="ジョブ選択で表示">
            </div>
            <div class="input-group">
                <label>スキル効果</label>
                <textarea id="skill-effect" rows="2" readonly placeholder="ジョブ選択で効果表示"></textarea>
            </div>
            <div class="input-group">
                <label>📝 キャラクター概要・プロフィール</label>
                <textarea id="profile" rows="4" placeholder="年齢、性別、外見、性格、背景、特技など自由記入"></textarea>
            </div>
        </div>

        <div class="section">
            <div class="section-title">🖼️ キャラクター画像</div>
            <div class="image-area">
                <input type="file" id="image-upload" accept="image/*">
                <img id="character-image" class="image-preview" alt="キャラクター画像">
            </div>
            <div class="section-title" style="margin-top: 15px;">📊 戦闘記録</div>
            <div class="record-row">
                <div class="input-group">
                    <label>✨ スポットライト獲得数</label>
                    <input type="number" id="spotlight" min="0" value="0">
                </div>
                <div class="input-group">
                    <label>💬 残りナイス！回数</label>
                    <select id="nice-left">
                        <option value="3">3回</option>
                        <option value="2">2回</option>
                        <option value="1">1回</option>
                        <option value="0">0回</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>🔥 必殺技名</label>
                    <input type="text" id="special-name" placeholder="例：ジャスティスクラッシュ">
                </div>
            </div>
            <div class="input-group">
                <label>🎲 ドラマチックポイント (DP) 上限5</label>
                <input type="number" id="dp" min="0" max="5" value="0">
            </div>
        </div>
    </div>

    <!-- ステータスと五角形チャート -->
    <div class="section">
        <div class="section-title">💪 ステータス</div>
        <div class="stat-inputs">
            <div class="input-group"><label>運 (1-6)</label><input type="number" id="luck" min="1" max="6" value="3"></div>
            <div class="input-group"><label>人間性 (1-6)</label><input type="number" id="humanity" min="1" max="6" value="3"></div>
            <div class="input-group"><label>体力 (1-6)</label><input type="number" id="stamina" min="1" max="6" value="3"></div>
            <div class="input-group"><label>力 (1-6)</label><input type="number" id="strength" min="1" max="6" value="3"></div>
            <div class="input-group"><label>頭脳 (1-6)</label><input type="number" id="intelligence" min="1" max="6" value="3"></div>
        </div>
        <div class="chart-container">
            <canvas id="radarChart" width="400" height="400" style="max-width: 100%; height: auto;"></canvas>
        </div>
        <div class="input-group">
            <label>💖 HP（自動計算）: <strong id="hpDisplay">?</strong></label>
        </div>
        <div class="input-group">
            <label>⭐ 技能強化ポイント: <strong id="totalStatus">0</strong></label>
        </div>
    </div>

    <!-- 技能値一覧 -->
    <div class="section">
        <div class="section-title">📚 技能値</div>
        <p><strong>残り技能ポイント: <span id="remainingPoints">0</span></strong></p>
        <div id="skills-grid" class="skills-grid"></div>
    </div>

    <!-- 関係性と状態異常 -->
    <div class="two-columns">
        <div class="section">
            <div class="section-title">🤝 関係性（任意）</div>
            <div id="relationship-container"></div>
            <button type="button" class="btn" id="add-relationship" style="margin-top: 8px; width: 100%;">＋ 関係性を追加</button>
        </div>
        <div class="section">
            <div class="section-title">⚠️ 状態異常</div>
            <div class="status-badges" id="status-badges"></div>
        </div>
    </div>

    <div class="section">
        <div class="section-title">📝 メモ・特記事項</div>
        <textarea id="memo" rows="3" placeholder="自由記入欄"></textarea>
    </div>

    <div class="copyright">© 2026 スポットライト・ダイブ製作委員会</div>
</div>

<script>
    // ==================== 技能データ定義 ====================
    const skillCategories = {
        "⚔️ 戦闘系": ["sword","shoot","martial","throw","evade","restrain"],
        "🔍 探索系": ["observe","search","stealth","survival","track","escape"],
        "⚙️ 技術系": ["repair","operate","drive","medical","steal","craft"],
        "📖 知識系": ["academics","mind","luckSkill","intuition","history","investigate"],
        "🗣️ 社交系": ["negotiate","trust","lie","intimidate","disguise","perform"],
        "🏃 アクション系": ["acrobatics","run","provoke","jump","protect","climb"]
    };
    const skillNames = {
        sword:"剣術", shoot:"射撃", martial:"格闘", throw:"投擲", evade:"回避", restrain:"拘束",
        observe:"観察", search:"捜索", stealth:"隠密", survival:"生存", track:"追跡", escape:"逃避",
        repair:"修理", operate:"操作", drive:"運転", medical:"医療", steal:"奪取", craft:"制作",
        academics:"学問", mind:"読心", luckSkill:"幸運", intuition:"直感", history:"歴史", investigate:"調査",
        negotiate:"交渉", trust:"信用", lie:"嘘", intimidate:"威圧", disguise:"変装", perform:"パフォーマンス",
        acrobatics:"体術", run:"走破", provoke:"挑発", jump:"ジャンプ", protect:"かばう", climb:"クライミング"
    };
    const allSkillIds = Object.values(skillCategories).flat();

    const jobSkillMap = {
        "ヒーロー": ["martial","evade","protect"], "忍者":["stealth","throw","observe"],
        "アイドル":["perform","negotiate","luckSkill"], "剣士":["sword","acrobatics","run"],
        "発明家":["repair","operate","craft"], "スポーツマン":["run","jump","acrobatics"],
        "怪盗":["steal","escape","stealth"], "スパイ":["disguise","lie","investigate"],
        "料理人":["craft","martial","luckSkill"], "カードマスター":["luckSkill","lie","intuition"],
        "警察官":["intimidate","track","martial"], "ロボマイスター":["repair","operate","craft"],
        "学生":["run","academics","luckSkill"], "無職（フリーダム）":[], "元主人公":[]
    };
    const jobWeakSkillMap = {
        "ヒーロー":["steal","lie"], "忍者":["intimidate","negotiate"], "アイドル":["martial","repair"],
        "剣士":["operate","disguise"], "発明家":["martial","intuition"], "スポーツマン":["mind","academics"],
        "怪盗":["martial","intimidate"], "スパイ":["martial","craft"], "料理人":["history","academics"],
        "カードマスター":["martial","run"], "警察官":["lie","stealth"], "ロボマイスター":["perform","mind"],
        "学生":["intimidate","lie"], "無職（フリーダム）":[], "元主人公":[]
    };
    const jobSkillInfoMap = {
        "ヒーロー":{name:"ジャスティスハート（常時）",effect:"HP半分以下で全判定+1"},
        "忍者":{name:"刃の心（DP1）",effect:"離脱または次の判定自動成功"},
        "アイドル":{name:"あなたのハートをロックオン！（DP2）",effect:"ナイス！時さらに獲得数+1"},
        "剣士":{name:"二刀流（DP2）",effect:"攻撃2回。両方成功で獲得数+1"},
        "発明家":{name:"マッドサイエンティスト（常時）",effect:"制作・修理判定+2（失敗で爆発）"},
        "アスリート":{name:"ド根性ッ！（常時）",effect:"HP0を1度だけHP1で耐える"},
        "怪盗":{name:"大変な物を盗んでいきました（DP1）",effect:"奪取自動成功＋離脱"},
        "スパイ":{name:"FAKE（DP2）",effect:"このターン攻撃を受けない"},
        "料理人":{name:"Bon appétit（DP2）",effect:"全員HP1d6回復＋獲得数+1"},
        "カードマスター":{name:"俺のターン！（DP3）",effect:"判定やり直し"},
        "警察官":{name:"実力を行使（常時）",effect:"威圧・追跡判定+1"},
        "ロボマイスター":{name:"バトル・スタート！（DP2）",effect:"ロボ召喚（HP10,攻撃1d6）1回/セッション"},
        "学生":{name:"青春の風（常時）",effect:"走破・学問判定+1"},
        "無職（フリーダム）":{name:"自宅警備員（特殊）",effect:"GMと相談"},
        "元主人公":{name:"過去と約束（DP2）",effect:"味方判定+2、自分【動揺】"}
    };

    let skillBaseValues = {};
    allSkillIds.forEach(id => { skillBaseValues[id] = 4; });

    function getVal(id) { return Number(document.getElementById(id).value) || 0; }
    function updateHP() { let hp = getVal('stamina') + getVal('strength') + 5; document.getElementById('hpDisplay').innerText = hp; }
    function updateTotalStatus() {
        let total = getVal('luck')+getVal('humanity')+getVal('stamina')+getVal('strength')+getVal('intelligence');
        document.getElementById('totalStatus').innerText = total; return total;
    }
    function updateRemainingPoints() {
        let total = updateTotalStatus();
        let used = 0;
        allSkillIds.forEach(id => { let val = getVal(id); if(val) used += (val - skillBaseValues[id]); });
        document.getElementById('remainingPoints').innerText = total - used;
    }
    function setJobSkills() {
        let job = document.getElementById('job').value;
        let info = jobSkillInfoMap[job];
        document.getElementById('skill-name').value = info ? info.name : "";
        document.getElementById('skill-effect').value = info ? info.effect : "";
        if(!job) return;
        allSkillIds.forEach(id => skillBaseValues[id] = 4);
        (jobWeakSkillMap[job] || []).forEach(id => { if(skillBaseValues.hasOwnProperty(id)) skillBaseValues[id] = 3; });
        (jobSkillMap[job] || []).forEach(id => { if(skillBaseValues.hasOwnProperty(id)) skillBaseValues[id] = 6; });
        allSkillIds.forEach(id => { 
            let input = document.getElementById(id);
            if(input) input.value = skillBaseValues[id];
        });
        updateRemainingPoints();
    }

    function addRelationshipField(name="", desc="") {
        const container = document.getElementById('relationship-container');
        const div = document.createElement('div'); div.className = 'relationship-item';
        div.innerHTML = `<input type="text" placeholder="相手の名前" value="${name.replace(/"/g, '&quot;')}">
                         <input type="text" placeholder="関係性" value="${desc.replace(/"/g, '&quot;')}">
                         <button onclick="this.parentElement.remove()">削除</button>`;
        container.appendChild(div);
    }
    const statusList = ["毒","睡魔","動揺","麻痺","魅了","空腹"];
    let activeStatus = new Set();
    function renderStatusBadges() {
        const container = document.getElementById('status-badges');
        container.innerHTML = '';
        statusList.forEach(s => {
            const badge = document.createElement('div');
            badge.className = 'status-badge' + (activeStatus.has(s) ? ' active' : '');
            badge.innerText = `【${s}】`;
            badge.onclick = () => { if(activeStatus.has(s)) activeStatus.delete(s); else activeStatus.add(s); renderStatusBadges(); };
            container.appendChild(badge);
        });
    }

    function drawRadar() {
        const canvas = document.getElementById('radarChart');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0,0,w,h);
        const cx = w/2, cy = h/2;
        const r = Math.min(w,h)*0.35;
        const angles = [-Math.PI/2, -Math.PI/2+2*Math.PI/5, -Math.PI/2+4*Math.PI/5, -Math.PI/2+6*Math.PI/5, -Math.PI/2+8*Math.PI/5];
        const labels = ["運","人間性","体力","力","頭脳"];
        const vals = [getVal('luck'), getVal('humanity'), getVal('stamina'), getVal('strength'), getVal('intelligence')];
        for(let lvl=1; lvl<=6; lvl++) {
            ctx.beginPath();
            let rr = r * lvl / 6;
            for(let i=0;i<5;i++) {
                let x = cx + rr * Math.cos(angles[i]);
                let y = cy + rr * Math.sin(angles[i]);
                if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }
            ctx.closePath(); ctx.strokeStyle="#ddd"; ctx.stroke();
        }
        for(let i=0;i<5;i++) {
            let x = cx + r * Math.cos(angles[i]);
            let y = cy + r * Math.sin(angles[i]);
            ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.stroke();
            ctx.fillStyle="#333"; ctx.font="bold 12px sans-serif";
            let lx = cx + (r+15)*Math.cos(angles[i]);
            let ly = cy + (r+15)*Math.sin(angles[i]);
            ctx.fillText(labels[i], lx-10, ly-5);
        }
        ctx.beginPath();
        for(let i=0;i<5;i++) {
            let rr = r * Math.min(6,Math.max(0,vals[i])) / 6;
            let x = cx + rr * Math.cos(angles[i]);
            let y = cy + rr * Math.sin(angles[i]);
            if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.closePath(); ctx.fillStyle="rgba(255,170,0,0.3)"; ctx.fill(); ctx.strokeStyle="#ffaa00"; ctx.lineWidth=2; ctx.stroke();
    }

    function buildSkillsUI() {
        const container = document.getElementById('skills-grid');
        if(!container) return;
        container.innerHTML = '';
        for(let [cat, ids] of Object.entries(skillCategories)) {
            const div = document.createElement('div'); div.className = 'skill-category';
            div.innerHTML = `<h4>${cat}</h4>`;
            ids.forEach(id => {
                const row = document.createElement('div'); row.className = 'skill-row';
                row.innerHTML = `<label>${skillNames[id]}</label><input type="number" id="${id}" min="3" max="10" value="4">`;
                div.appendChild(row);
            });
            container.appendChild(div);
        }
        allSkillIds.forEach(id => { 
            let el = document.getElementById(id);
            if(el) el.addEventListener('input', updateRemainingPoints);
        });
        updateRemainingPoints();
    }

    // 画像アップロード
    const imageUpload = document.getElementById('image-upload');
    if(imageUpload) {
        imageUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = ev => { 
                    const img = document.getElementById('character-image');
                    if(img) { img.src = ev.target.result; img.classList.add('show'); }
                };
                reader.readAsDataURL(file);
            }
        });
    }

    // スクリーンショット
    const screenshotBtn = document.getElementById('screenshot-btn');
    if(screenshotBtn) {
        screenshotBtn.addEventListener('click', function() {
            const element = document.getElementById('sheet-container');
            html2canvas(element, { scale: 2, backgroundColor: '#ffffff', useCORS: true })
                .then(canvas => { 
                    const link = document.createElement('a');
                    link.download = 'spotlight-dive-character.png';
                    link.href = canvas.toDataURL();
                    link.click();
                })
                .catch(() => alert('スクリーンショットに失敗しました'));
        });
    }

    // スマホ表示切り替え
    const container = document.getElementById('sheet-container');
    const smartBtn = document.getElementById('smartphone-mode-btn');
    const pcBtn = document.getElementById('pc-mode-btn');
    if(smartBtn && pcBtn && container) {
        smartBtn.onclick = () => { 
            container.classList.add('smartphone-mode'); 
            smartBtn.style.display='none'; 
            pcBtn.style.display='inline-block'; 
        };
        pcBtn.onclick = () => { 
            container.classList.remove('smartphone-mode'); 
            pcBtn.style.display='none'; 
            smartBtn.style.display='inline-block'; 
        };
    }

    // 初期化
    window.onload = () => {
        buildSkillsUI();
        renderStatusBadges();
        addRelationshipField("PL2","幼なじみ");
        addRelationshipField("PL3","ライバル");
        addRelationshipField("PL4","師弟関係");
        const addBtn = document.getElementById('add-relationship');
        if(addBtn) addBtn.onclick = () => addRelationshipField();

        ['luck','humanity','stamina','strength','intelligence'].forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.addEventListener('input', () => { 
                    updateHP(); 
                    updateTotalStatus(); 
                    updateRemainingPoints(); 
                    drawRadar(); 
                });
            }
        });
        const jobSelect = document.getElementById('job');
        if(jobSelect) jobSelect.addEventListener('change', () => { setJobSkills(); drawRadar(); });
        updateHP(); 
        updateTotalStatus(); 
        drawRadar();
    };
</script>
</body>
</html>
