name: Deploy to GitHub Pages (gh-pages)

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare public directory
        run: |
          set -e
          rm -rf public || true
          mkdir public
          # Copy main files for static demo
          cp -v deepseek_html_20260402_5ceeb0.html public/ || true
          cp -v deepseek_html_smartphone_export.html public/ || true
          cp -v README.md public/ || true
          cp -v LICENSE public/ || true
          if [ -d assets ]; then cp -r assets public/; fi
          # avoid deploying workflow files
          rm -rf public/.github || true
      - name: Deploy to gh-pages (manual push)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Preparing gh-pages deploy"
          rm -rf gh-pages || true
          git clone --branch gh-pages https://github.com/${{ github.repository }} gh-pages 2>/dev/null || git clone https://github.com/${{ github.repository }} gh-pages
          rm -rf gh-pages/*
          cp -R public/* gh-pages/ || true
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy: ${GITHUB_SHA}" || true
          # push using token
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" gh-pages --force
